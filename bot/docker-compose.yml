version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: church_bot
      POSTGRES_USER: botuser
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./bot/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botuser"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  bot-api:
    build:
      context: ..
      dockerfile: bot/Dockerfile
    command: node bot/src/index.js
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://botuser:${DB_PASSWORD}@postgres:5432/church_bot
      REDIS_URL: redis://redis:6379
      ENABLE_SCHEDULER: "true"
      BOT_PORT: 4100
      BOT_TIMEZONE: Africa/Lagos
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      WHATSAPP_PROVIDER: meta
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN}
      META_PHONE_NUMBER_ID: ${META_PHONE_NUMBER_ID}
      META_WABA_ID: ${META_WABA_ID}
      META_WEBHOOK_VERIFY_TOKEN: ${META_WEBHOOK_VERIFY_TOKEN}
      META_APP_SECRET: ${META_APP_SECRET}
      META_API_VERSION: ${META_API_VERSION:-v21.0}
    ports:
      - "4100:4100"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4100/bot/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  bot-worker:
    build:
      context: ..
      dockerfile: bot/Dockerfile
    command: node bot/src/worker.js
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://botuser:${DB_PASSWORD}@postgres:5432/church_bot
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      WHATSAPP_PROVIDER: meta
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN}
      META_PHONE_NUMBER_ID: ${META_PHONE_NUMBER_ID}
      META_WABA_ID: ${META_WABA_ID}
      META_WEBHOOK_VERIFY_TOKEN: ${META_WEBHOOK_VERIFY_TOKEN}
      META_APP_SECRET: ${META_APP_SECRET}
      META_API_VERSION: ${META_API_VERSION:-v21.0}
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
